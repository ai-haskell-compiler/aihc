name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nix CI
        uses: ./.github/actions/setup-nix-ci
        with:
          r2-account-id: ${{ vars.R2_ACCOUNT_ID }}
          r2-access-key: ${{ vars.R2_ACCESS_KEY }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          nix-cache-private-key: ${{ secrets.NIX_CACHE_PRIVATE_KEY }}

      - name: Build documentation and coverage
        run: |
          echo "=== Building Haddock documentation ==="
          nix build .#docs --print-out-paths
          cp -rL result docs-output

          echo "=== Building coverage report ==="
          nix build .#coverage --print-out-paths
          cp -rL result docs-output/coverage

          echo "=== Site structure ==="
          find docs-output -type f | head -50

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
