extensions:
- LambdaCase
- TemplateHaskell
formatters:
  aihc-fmt:
    output: |
      module Main where
      xs = [1, 2, 3]
      f = case True of {
        True -> 1;
        False | otherwise
         -> 0 }
      g = \case {
        True -> 1;
        False | otherwise
         -> 0 }
      h = case True of {
        True -> do {
            pure
              1 } }
      q = [d|
        x = 1 |]
      empty = [d| |]
    status: pass
input: |
  module Main where
  xs=[1,2,3]
  f = case True of { True -> 1; False | otherwise -> 0 }
  g = \case { True -> 1; False | otherwise -> 0 }
  h = case True of { True -> do { pure 1 } }
  q = [d| x=1 |]
  empty = [d| |]
