extensions: []
formatters:
  aihc-fmt:
    output: |
      module Main where {
      main = do {
              x <- pure
                  1;
              y <- pure
                  2;
              pure
                  y };
      f v = case v of {
              True -> 1;
              False -> 0 };
      g = let { a = 1;
              b = 2 }
            in a;
      h x = x
          where {
            y = 1 } }
    status: pass
input: |
  module Main where { main = do { x <- pure 1; y <- pure 2; pure y }; f v = case v of { True -> 1; False -> 0 }; g = let { a = 1; b = 2 } in a; h x = x where { y = 1 } }
