extensions: []
modules:
  - |
    module Main where
    import Missing.Foo
    x = importedValue
expected: |
  Main:
    - "2:1-2:18 Missing.Foo => (type) Error could not find Missing.Foo module"
    - "3:1-3:13 x => (value) Main.x"
    - "3:5-3:18 importedValue => (value) Error unbound"
annotated:
