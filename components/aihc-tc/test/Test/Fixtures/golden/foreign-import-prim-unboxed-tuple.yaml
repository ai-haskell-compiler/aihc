extensions:
  - GHCForeignImportPrim
  - MagicHash
  - UnboxedTuples
modules:
  - |
    module Test where
    foreign import prim "tup" tuple :: () -> (# Int#, Int# #)
    test = tuple
expected:
  - "tuple :: () -> (# Int#, Int# #)"
  - "test :: () -> (# Int#, Int# #)"
status: pass
reason: "foreign import prim preserves unboxed tuple result types in imported signatures"
