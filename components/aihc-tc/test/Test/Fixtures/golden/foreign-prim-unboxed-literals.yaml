extensions:
  - MagicHash
modules:
  - |
    module Test where
    foreign import prim (+#) :: Int# -> Int# -> Int#
    int# = 10#
    word# = 10##
expected:
  - "(+#) :: Int# -> Int# -> Int#"
  - "word# :: Word#"
  - "int# :: Int#"
status: pass
reason: "foreign import prim registers unboxed primitive functions and MagicHash literals keep their unboxed types"
