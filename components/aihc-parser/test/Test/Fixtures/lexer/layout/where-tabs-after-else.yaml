extensions: []
input: |
  addExtension file ext = case B.uncons ext of
  	Nothing -> file
  	Just (x,_xs) -> joinDrive a $
  		if isExtSeparator x
  			then b <> ext
  			else b <> (extSeparator `B.cons` ext)
    where
  	(a,b) = splitDrive file
