# Testing: 1e+_23 (invalid - underscore after sign in exponent)
# Per GHC docs, this should be invalid. Lexer splits it into separate tokens.
extensions:
  - NumericUnderscores
input: "1e+_23"
tokens:
  - "TkInteger 1 TInteger"
  - 'TkVarId "e"'
  - 'TkVarSym "+"'
  - 'TkVarId "_23"'
  - "TkEOF"
status: pass
