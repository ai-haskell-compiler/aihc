extensions: []
input: |
  module StringGapWhere where
  f = header ++ footer
    where
      header = "hello\
               \world"
      footer = "bye"
ast: "Module {ModuleHead {\"StringGapWhere\"}, [DeclValue (PatternBind NoMultiplicityTag PVar UnqualifiedName {\"f\"} UnguardedRhs (EInfix (EVar Name {\"header\"}) Name {\"++\"} (EVar Name {\"footer\"})) Just [DeclValue (PatternBind NoMultiplicityTag PVar UnqualifiedName {\"header\"} UnguardedRhs (EString \"helloworld\")), DeclValue (PatternBind NoMultiplicityTag PVar UnqualifiedName {\"footer\"} UnguardedRhs (EString \"bye\"))])]}"
status: pass
comment: |
  String gap inside a where block must not trigger premature layout
  closure. When a string literal with gaps spans multiple lines, the
  next token after the closing quote may appear on the same line as
  the string end but a different line from the string start. The
  layout engine must use the end line of the previous token for BOL
  detection, not the start line.