dependencies:
  - aihc-base
  - aihc-prim
extensions:
  - MagicHash
  - UnboxedTuples
modules:
  - |
    module Test where
    import GHC.Prim (MutVar#, RealWorld, State#, newMutVar#, readMutVar#, writeMutVar#)

    foreign import prim (+#) :: Int# -> Int# -> Int#

    state :: State# RealWorld
    state = state
output: |
  50
expression: |
  case newMutVar# 10# state of
    (# state1, first #) -> case newMutVar# 20# state1 of
      (# state2, second #) -> case writeMutVar# first 30# state2 of
        state3 -> case readMutVar# first state3 of
          (# state4, firstValue #) -> case readMutVar# second state4 of
            (# _, secondValue #) -> (+#) firstValue secondValue
status: pass
reason: allocates distinct MutVar# cells and only updates the targeted cell
