dependencies:
  - aihc-base
  - aihc-prim
extensions:
  - MagicHash
  - UnboxedTuples
modules:
  - |
    module Test where
    import GHC.Prim (MutVar#, RealWorld, State#, newMutVar#, readMutVar#, writeMutVar#)

    state :: State# RealWorld
    state = state
output: |
  42
expression: |
  case newMutVar# 1# state of
    (# state1, mutVar #) -> case writeMutVar# mutVar 42# state1 of
      state2 -> case readMutVar# mutVar state2 of
        (# _, value #) -> value
status: pass
reason: observes a value written to a MutVar# through aihc-prim
