extensions:
  - ExtendedLiterals
  - MagicHash
dependencies:
  - aihc-base
modules:
  - |
    module Test where

    import Data.Int (Int32 (..))
    import Foreign.C.Types (CInt (..))
    import GHC.IO.StdHandles (getIOBufferByte, newIOBuffer, setIOBufferByte)

    bufferRoundTrip :: IO CInt
    bufferRoundTrip = do
      buffer <- newIOBuffer (CInt (I32# 4#Int32))
      setIOBufferByte buffer (CInt (I32# 3#Int32)) (CInt (I32# 65#Int32))
      getIOBufferByte buffer (CInt (I32# 3#Int32))
output: |
  I32# 65
expression: bufferRoundTrip
status: pass
reason: allocates stable IOBuffer storage and reads a byte written at the final valid index
