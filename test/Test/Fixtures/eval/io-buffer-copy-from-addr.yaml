extensions:
  - ExtendedLiterals
  - MagicHash
dependencies:
  - aihc-base
modules:
  - |
    module Test where

    import Data.Int (Int32 (..))
    import Foreign.C.Types (CInt (..))
    import GHC.IO.StdHandles (copyAddrToIOBuffer, getIOBufferByte, newIOBuffer)

    main :: IO CInt
    main = do
      buffer <- newIOBuffer (CInt (I32# 4#Int32))
      copyAddrToIOBuffer "ABC"# buffer (CInt (I32# 1#Int32)) (CInt (I32# 3#Int32))
      getIOBufferByte buffer (CInt (I32# 3#Int32))
output: |
  I32# 67
expression: main
status: pass
reason: copies an explicit Addr# byte range into an IOBuffer at a nonzero destination offset
