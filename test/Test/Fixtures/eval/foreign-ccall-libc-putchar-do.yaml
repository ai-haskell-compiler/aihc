  - MagicHash
dependencies:
  - aihc-base
modules:
  - |
    module Test where

    import Data.Int (Int32 (..))
    import Foreign.C.Types (CInt (..))

    foreign import ccall unsafe putchar :: CInt -> IO CInt

    putTwo :: CInt -> CInt -> IO CInt
    putTwo first second = do
      putchar first
      putchar second
stdout: AB
output: |
  CInt (I32# 66)
expression: |
  putTwo (CInt (I32# 65#Int32)) (CInt (I32# 66#Int32))
status: pass
reason: threads RealWorld state through two putchar actions using Monad IO
