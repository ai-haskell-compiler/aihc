extensions:
  - EmptyDataDecls
  - MagicHash
  - UnboxedTuples
modules:
  - |
    module Test where
    data State# s
    data RealWorld

    foreign import prim raise# :: a -> b
    foreign import prim catch# ::
      (State# RealWorld -> (# State# RealWorld, a #)) ->
      (b -> State# RealWorld -> (# State# RealWorld, a #)) ->
      State# RealWorld ->
      (# State# RealWorld, a #)
    foreign import prim realWorld# :: State# RealWorld
    foreign import prim (+#) :: Int# -> Int# -> Int#

    throwing _ = raise# 10#
    handler e s = (# s, (+#) e 32# #)
output: |
  42
expression: |
  case catch# throwing handler realWorld# of
    (# _, x #) -> x
status: pass
reason: evaluates catch# from realWorld# by passing a raised primitive exception to the handler
